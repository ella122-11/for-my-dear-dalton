<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dalton's To-Do List</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%);
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: rgba(255, 255, 255, 0.95);
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(2, 116, 216, 0.15);
            box-shadow: 0 10px 30px rgba(2, 116, 216, 0.1);
        }
        h1 {
            font-size: 26px;
            margin: 0 0 6px 0;
            color: #0274d8;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 30px;
            font-weight: 500;
        }
        .input-field {
            width: 100%;
            padding: 14px;
            margin: 12px 0;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.2s;
        }
        .input-field:focus {
            outline: none;
            border-color: #0274d8;
            box-shadow: 0 0 0 3px rgba(2, 116, 216, 0.15);
        }
        .auth-btn {
            background: linear-gradient(135deg, #0284c7 0%, #0274d8 100%);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 700;
            width: 100%;
            font-size: 15px;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(2, 116, 216, 0.2);
            transition: all 0.2s;
        }
        .auth-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 15px rgba(2, 116, 216, 0.3);
        }
        .logout-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            padding: 0;
            font-size: 13px;
        }
        .logout-btn:hover {
            text-decoration: underline;
        }
        .todo-item {
            display: flex;
            align-items: flex-start;
            padding: 16px;
            margin-bottom: 12px;
            background: #f8fafc;
            border: 1px solid #f1f5f9;
            border-radius: 12px;
            transition: all 0.2s;
        }
        .todo-item:hover {
            background: #f0fdf4;
            border-color: rgba(2, 116, 216, 0.15);
        }
        .todo-checkbox {
            margin: 4px 16px 0 0;
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #0274d8;
        }
        .todo-content { flex: 1; }
        .todo-title { font-weight: 700; font-size: 15px; color: #1e293b; margin-bottom: 3px; }
        .todo-desc { font-size: 13px; color: #64748b; line-height: 1.4; margin-bottom: 6px; }
        .todo-deadline {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            background-color: #ffe4e6;
            color: #e11d48;
            padding: 2px 8px;
            border-radius: 6px;
        }
        .completed {
            background: #f1f5f9 !important;
            border-color: #e2e8f0;
        }
        .completed .todo-title { text-decoration: line-through; color: #94a3b8; }
        .completed .todo-desc { color: #cbd5e1; }
        .completed .todo-deadline { background-color: #e2e8f0; color: #94a3b8; }
        .user-status {
            font-size: 13px;
            color: #334155;
            background: #f0f9ff;
            border: 1px solid #e0f2fe;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Dalton's To-Do List Tracker</h1>
    <div class="subtitle">You can do this!</div>

    <div id="auth-section">
        <p style="font-size: 14px; margin: 0 0 6px 0; color: #475569; font-weight: 500;">Enter your email to receive a login link:</p>
        <input type="email" id="student-email" class="input-field" placeholder="username@gmail.com">
        <button id="login-btn" class="auth-btn">Send Login Link</button>
    </div>

    <div id="user-info" class="user-status hidden">
        <span>Logged in as: <strong id="user-email" style="color: #0274d8;"></strong></span>
        <button id="logout-btn" class="logout-btn">Logout</button>
    </div>

    <div id="tracker-area" class="hidden">
        <div id="todo-list"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://ezlkgnofsqvcyjgsumfg.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6bGtnbm9mc3F2Y3lqZ3N1bWZnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MTkxMDMsImV4cCI6MjA5OTI5NTEwM30.3Dr5fJm6F-se9GoDA2Pd8dQqLdIDlih_J9tCwrTNt5k";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const MASTER_TASKS = [
        {
            id: "task_001",
            title: "Pre-Calculus: Parabola in Real-Life Activity",
            description: "Check Google Classroom for more information..",
            deadline: "No specific date"
        },
        {
            id: "task_002",
            title: "Pre-Calculus: Quiz#2",
            description: "Check Google Classroom for more information.",
            deadline: "No specific Date"
        },
        {
            id: "task_003",
            title: "Filipino: Pink Long Clear Book Compilation of Works",
            description: "Compilation of activities and quizzes.",
            deadline: "End of term"
        },
        {
            id: "task_004",
            title: "Pre-Calculus: Summative Test",
            description: "Review from circle to ellipse.",
            deadline: "July 13"
        },
        {
            id: "task_005",
            title: "Filipino: Group Presentation",
            description: "Continuation of group presentation for Katitikan ng Pulong.",
            deadline: "July 13"
        },
        {
            id: "task_006",
            title: "Practical Research 2: Checking of Final Draft of Background of the Study and Proposed Title",
            description: "Checking of final draft of Background of the study and proposed title of your studies.",
            deadline: "July 13"
        },
        {
            id: "task_007",
            title: "Physics: Friday Asynchronous Activity",
            description: "Summary notes about the 3 videos sent, and answer word  problem.",
            deadline: "July 13"
        },
        {
            id: "task_008",
            title: "EAPP: Friday Asynchronous Activity",
            description: "Before bed time, recall how your day was during the 1st cancellation of classes today. Front page, short paragraph of summary about your day and at the back of the paper, rewrite it using roman numerals, letters, and hindu arabic numbers to separate main point and key points.",
            deadline: "July 13"
        },
        {
            id: "task_009",
            title: "Filipino: Friday Asynchronous Activity",
            description: "Group 1 & 2, write a reflection about your group presentation last Thursday and Group 3 & 4, write a summary about the minutes of the meeting prepared, and upload it on the Google Drive given.",
            deadline: "July 11"
        },
        {
            id: "task_010",
            title: "Practical Research 2: Friday Asynchronous Activity",
            description: "Submit the outline of your background of the study and proposed title.",
            deadline: "July 11"
        },
        {
            id: "task_011",
            title: "HOPE 3: Friday Asynchronous Activity",
            description: "Answer the Google Form given.",
            deadline: "July 11"
        },
        {
            id: "task_012",
            title: "HOPE 3: Basic Steps Performance",
            description: "Dance presentation of each groups using basic steps.",
            deadline: "July 15"
        },
        {
            id: "task_013",
            title: "HOPE 3: Summative Test",
            description: "Review about fundamental and basic steps.",
            deadline: "July 15"
        },
        {
            id: "task_014",
            title: "Filipino: Aralin 4 Quiz",
            description: "Answer Google Form given.",
            deadline: "July 11, 12:25 PM"
        },
        {
            id: "task_015",
            title: "EAPP: Saturday Asynchronous Activity",
            description: "Write the important key points of lessons 1 to 3 on your notebook based on the PDF sent. Make sure to highlight main ideas and key points.",
            deadline: "July 13"
        },
    ];

    let currentUser = null;
    let userProgress = {};

    const localBackup = localStorage.getItem('dalton_todo_progress');
    if (localBackup) {
        userProgress = JSON.parse(localBackup);
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
        const email = document.getElementById('student-email').value.trim();
        if (!email) {
            alert("Please enter your email address.");
            return;
        }

        const targetRedirect = window.location.origin + window.location.pathname;

        const { error } = await supabaseClient.auth.signInWithOtp({
            email: email,
            options: {
                emailRedirectTo: targetRedirect
            }
        });

        if (error) {
            alert("Error: " + error.message);
        } else {
            alert("Login link sent! Please check your inbox.");
        }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
        await supabaseClient.auth.signOut();
        localStorage.removeItem('dalton_todo_progress');
        window.location.reload();
    });

    async function checkUserSession() {
        if (Object.keys(userProgress).length > 0) {
            showDashboard();
            renderTodoList();
        }

        try {
            const { data: { session }, error } = await supabaseClient.auth.getSession();
            if (session && !error) {
                currentUser = session.user;
                showDashboard();
                await fetchUserProgress();
            } else {
                handleOfflineFallback();
            }
        } catch (netError) {
            handleOfflineFallback();
        }
    }

    function handleOfflineFallback() {
        showDashboard();
        if (!currentUser) {
            document.getElementById('user-email').innerText = "Offline Mode";
        }
        renderTodoList();
    }

    function showDashboard() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('user-info').classList.remove('hidden');
        document.getElementById('user-email').innerText = currentUser ? currentUser.email : "Offline Mode";
        document.getElementById('tracker-area').classList.remove('hidden');
    }

    async function fetchUserProgress() {
        if (!currentUser || !navigator.onLine) {
            renderTodoList();
            return;
        }

        try {
            const { data, error } = await supabaseClient
                .from('user_progress')
                .select('task_id, is_completed')
                .eq('user_id', currentUser.id);

            if (data && !error) {
                userProgress = {};
                data.forEach(row => {
                    userProgress[row.task_id] = row.is_completed;
                });
                localStorage.setItem('dalton_todo_progress', JSON.stringify(userProgress));
            }
        } catch (err) {
            console.log("Supabase fetch failed. Staying on local data state.");
        }
        renderTodoList();
    }

    function renderTodoList() {
        const listContainer = document.getElementById('todo-list');
        listContainer.innerHTML = '';

        MASTER_TASKS.forEach(task => {
            const isChecked = userProgress[task.id] || false;
            const itemDiv = document.createElement('div');
            itemDiv.className = `todo-item ${isChecked ? 'completed' : ''}`;

            let deadlineHTML = '';
            if (task.deadline) {
                deadlineHTML = `<div class="todo-deadline">Due: ${task.deadline}</div>`;
            }

            itemDiv.innerHTML = `
                <input type="checkbox" class="todo-checkbox" data-id="${task.id}" ${isChecked ? 'checked' : ''}>
                <div class="todo-content">
                    <div class="todo-title">${task.title}</div>
                    <div class="todo-desc">${task.description}</div>
                    ${deadlineHTML}
                </div>
            `;
            listContainer.appendChild(itemDiv);
        });
        initCheckboxListeners();
    }

    function initCheckboxListeners() {
        document.querySelectorAll('.todo-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', async (e) => {
                const taskId = e.target.getAttribute('data-id');
                const isChecked = e.target.checked;

                userProgress[taskId] = isChecked;
                localStorage.setItem('dalton_todo_progress', JSON.stringify(userProgress));

                const itemParent = e.target.closest('.todo-item');
                if (isChecked) itemParent.classList.add('completed');
                else itemParent.classList.remove('completed');

                if (currentUser && navigator.onLine) {
                    try {
                        await supabaseClient
                            .from('user_progress')
                            .upsert({
                                user_id: currentUser.id,
                                task_id: taskId,
                                is_completed: isChecked
                            }, { onConflict: 'user_id,task_id' });
                    } catch (error) {
                        console.error("Database upsert failed, safely backed up locally.");
                    }
                }
            });
        });
    }

    checkUserSession();

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker successfully registered!'))
                .catch(err => console.log('Service Worker registration failed: ', err));
        });
    }
</script>
</body>
</html>
