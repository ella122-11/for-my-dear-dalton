        if (!email) {

            return;
        }

            email: email,
            options: {
                emailRedirectTo: targetRedirect
            }
        });

            alert("Error: " + error.message);

    });

    async function checkUserSession() {
        try {
            const { data: { session }, error } = await supabaseClient.auth.getSession();

            if (session && !error) {
                currentUser = session.user;
                showDashboard();
                await fetchUserProgress();
            } else {
                showLogin();
            }
        } catch (netError) {
            alert("Please check your internet connection to login.");
            showLogin();
        }
    }

function showLogin() {
        document.getElementById('auth-section').classList.remove('hidden');
        document.getElementById('tracker-area').classList.add('hidden');
        document.getElementById('user-info').classList.add('hidden');
    }

    function showDashboard() {
        document.getElementById('auth-section').classList.add('hidden');
        document.getElementById('user-info').classList.remove('hidden');
        document.getElementById('user-email').innerText = currentUser ? currentUser.email : "Offline Mode";
        document.getElementById('tracker-area').classList.remove('hidden');
    }

    async function fetchUserProgress() {
        if (!currentUser || !navigator.onLine) {
            renderTodoList();
            return;
        }

        try {
            const { data, error } = await supabaseClient
                .from('user_progress')
                .select('task_id, is_completed')
                .eq('user_id', currentUser.id);

            if (data && !error) {
                userProgress = {};
                data.forEach(row => {
                    userProgress[row.task_id] = row.is_completed;
                });
                localStorage.setItem('dalton_todo_progress', JSON.stringify(userProgress));
            }
        } catch (err) {
            console.log("Supabase fetch failed. Staying on local data state.");
        }
        renderTodoList();
    }

function renderTodoList() {
        const listContainer = document.getElementById('todo-list');
        listContainer.innerHTML = '';

        const getDeadlineDate = (deadline) => {
            if (!deadline || deadline.toLowerCase().includes("no specific") || deadline.toLowerCase().includes("end of term")) {
                return new Date("9999-12-31");
            }
            return new Date(deadline);
        };

        const sortedTasks = [...MASTER_TASKS].sort((a, b) => {
            const isCheckedA = userProgress[a.id] || false;
            const isCheckedB = userProgress[b.id] || false;

            if (isCheckedA !== isCheckedB) {
                return isCheckedA - isCheckedB;
            }

            return getDeadlineDate(a.deadline) - getDeadlineDate(b.deadline);
        });

        sortedTasks.forEach(task => {
            const isChecked = userProgress[task.id] || false;
            const itemDiv = document.createElement('div');
            itemDiv.className = `todo-item ${isChecked ? 'completed' : ''}`;

            let deadlineHTML = '';
            if (task.deadline) {
                deadlineHTML = `<div class="todo-deadline">Due: ${task.deadline}</div>`;
            }

            itemDiv.innerHTML = `
                <input type="checkbox" class="todo-checkbox" data-id="${task.id}" ${isChecked ? 'checked' : ''}>
                <div class="todo-content">
                    <div class="todo-title">${task.title}</div>
                    <div class="todo-desc">${task.description}</div>
                    ${deadlineHTML}
                </div>
            `;
            listContainer.appendChild(itemDiv);
        });
        initCheckboxListeners();
    }

function initCheckboxListeners() {
        document.querySelectorAll('.todo-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', async (e) => {
                const taskId = e.target.getAttribute('data-id');
                const isChecked = e.target.checked;

                userProgress[taskId] = isChecked;
                localStorage.setItem('dalton_todo_progress', JSON.stringify(userProgress));

                renderTodoList();

                if (currentUser && navigator.onLine) {
                    await supabaseClient
                        .from('user_progress')
                        .upsert({ user_id: currentUser.id, task_id: taskId, is_completed: isChecked }, { onConflict: 'user_id,task_id' });
                }
            });
        });
    }

    checkUserSession();

    if ('serviceWorker' in navigator) {

            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker successfully registered!'))
                .catch(err => console.log('Service Worker registration failed: ', err));
        });
    }
